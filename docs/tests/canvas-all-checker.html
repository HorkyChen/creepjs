<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link rel="icon" href="../favicon.ico">
  <link rel="stylesheet" href="../style.min.css">
  <title>All Canvas API Checking | CreepJS</title>
  <style>
    .canvas-test-item {
      margin: 20px 0;
      padding: 15px;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
    }
    .canvas-test-title {
      font-weight: bold;
      font-size: 16px;
      margin-bottom: 10px;
      color: #333;
    }
    .canvas-display {
      border: 1px solid #ccc;
      margin: 10px 0;
    }
    .hash-display {
      font-family: monospace;
      word-break: break-all;
      margin: 5px 0;
    }
    @media (prefers-color-scheme: dark) {
      .canvas-test-item {
        border-color: #444;
      }
      .canvas-test-title {
        color: #eee;
      }
      .canvas-display {
        border-color: #666;
      }
    }
  </style>
</head>

<body>
  <div id="fingerprint-data"></div>
  <script src="canvas-all-checker.js"></script>
</body>

</html>
